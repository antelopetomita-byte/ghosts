<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ghosts</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}
body{
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}
.container{
text-align:center;
}
.logo{
font-size:120px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}
.title{
font-size:48px;
letter-spacing:12px;
font-weight:300;
}
.subtitle{
margin-top:15px;
color:#888;
font-size:16px;
}
.start{
margin-top:40px;
padding:16px 40px;
background:#fff;
color:#000;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
}
@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}
</style>
</head>
<body>
<div class="container">
<div class="logo">👻</div>
<div class="title">
GHOSTS
</div>
<div class="subtitle">
Messages fade. Privacy stays.
</div>
<button class="start">
ENTER
</button>
</div>
</body>
</html>
